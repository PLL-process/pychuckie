<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Definit l'encodage pour afficher correctement les accents. -->
  <meta charset="UTF-8">
  <!-- Rend la page lisible sur ordinateur, tablette et smartphone. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Titre affiche dans l'onglet du navigateur. -->
  <title>PyChuckie - L'Odyssee du Code</title>
  <!-- Charge Pyodide pour executer Python directement dans le navigateur. -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.0/full/pyodide.js"></script>
  <!-- Charge la feuille de style principale. -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Conteneur general de l'application. -->
  <main class="app">
    <!-- En-tete pedagogique de l'application. -->
    <header class="hero">
      <!-- Titre principal du projet. -->
      <h1>🐣 PyChuckie - L'Odyssee du Code</h1>
      <!-- Sous-titre qui explique l'objectif aux eleves. -->
      <p>Joue avec Tolkaze, observe le parcours, puis programme-le en Python pour recuperer les oeufs.</p>
      <!-- Badge de fonctionnement sans installation locale. -->
      <span class="badge">Python dans le navigateur avec Pyodide</span>
    </header>

    <!-- Zone principale en deux colonnes. -->
    <section class="workspace">
      <!-- Colonne gauche : jeu et consignes. -->
      <section class="panel">
        <!-- Selecteur de niveau. -->
        <label for="levelSelect">Choisir un niveau</label>
        <!-- Liste des defis proposes. -->
        <select id="levelSelect"></select>
        <!-- Carte de consigne du niveau. -->
        <article id="mission" class="mission"></article>
        <!-- Zone graphique du jeu. -->
        <canvas id="gameCanvas" width="640" height="400" aria-label="Zone de jeu PyChuckie"></canvas>
        <!-- Boutons de controle du jeu. -->
        <div class="actions">
          <!-- Bouton pour reinitialiser le niveau. -->
          <button id="resetButton" type="button">Reinitialiser</button>
          <!-- Bouton pour afficher une aide. -->
          <button id="hintButton" type="button">Indice</button>
        </div>
      </section>

      <!-- Colonne droite : editeur et sortie console. -->
      <section class="panel editor-panel">
        <!-- Titre de la zone de code. -->
        <h2>Editeur Python</h2>
        <!-- Zone dans laquelle l'eleve ecrit son code Python. -->
        <textarea id="codeEditor" spellcheck="false"></textarea>
        <!-- Bouton d'execution du programme de l'eleve. -->
        <button id="runButton" type="button">▶ Executer le code</button>
        <!-- Zone de sortie du programme. -->
        <pre id="output">Chargement de Python...</pre>
      </section>
    </section>
  </main>

  <!-- Charge la logique de l'application. -->
  <script src="main.js"></script>
</body>
</html>
